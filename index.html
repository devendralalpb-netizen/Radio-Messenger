<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Radio Messenger</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex flex-col items-center justify-center bg-gray-900 text-white p-4">

  <h1 class="text-2xl font-bold mb-4">📡 Radio Messenger</h1>

  <div id="chat" class="w-full max-w-md h-80 overflow-y-auto bg-gray-800 rounded-2xl p-4 mb-4 shadow-lg"></div>

  <div class="flex w-full max-w-md">
    <input
      id="input"
      class="flex-1 p-2 rounded-l-xl bg-gray-700 outline-none"
      placeholder="Type message..."
    />
    <button
      onclick="sendMessage()"
      class="bg-green-500 px-4 rounded-r-xl hover:bg-green-600"
    >
      Send
    </button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function render(messages) {
      chat.innerHTML = "";
      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "mb-2";
        div.innerHTML = `<span class="text-green-400">[${msg.time}]</span> ${msg.text}`;
        chat.appendChild(div);
      });
      chat.scrollTop = chat.scrollHeight;
    }

    function getMessages() {
      return JSON.parse(localStorage.getItem("radio_messages") || "[]");
    }

    function sendMessage() {
      if (!input.value.trim()) return;

      const messages = getMessages();
      const newMessage = {
        text: input.value,
        time: new Date().toLocaleTimeString()
      };

      const updated = [...messages, newMessage];
      localStorage.setItem("radio_messages", JSON.stringify(updated));
      render(updated);
      input.value = "";
    }

    // Initial load
    render(getMessages());

    // Real-time sync across tabs
    window.addEventListener("storage", (e) => {
      if (e.key === "radio_messages") {
        render(JSON.parse(e.newValue) || []);
      }
    });
  </script>

</body>
</html>
